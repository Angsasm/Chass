token: "$LICHESS_BOT_TOKEN"

url: "https://lichess.org"

engine:
  dir: "./"
  name: "stoc"
  protocol: "uci"
  ponder: false       # Disable thinking on opponent's time to save RAM
  uci_options:
    Hash: 16          # Keeps the transposition table tiny (16MB)
    Threads: 1        # Forces only a single CPU core
    Use NNUE: false   # Disables the heavy neural network to free up ~100-300MB RAM

challenge:
  accept_bot: true
  max_time: 1200
  min_time: 60
  inc: 10
  time_controls:
    - bullet
    - blitz
    - rapid
    - classical
  variants:
    - standard
  modes:
    - casual
    - rated
