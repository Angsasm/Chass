token: "$LICHESS_BOT_TOKEN"

url: "https://lichess.org"

engine:
  dir: "./"
  name: "stoc"
  protocol: "uci"

challenge:
  # Permite botului să accepte provocări automat
  accept_bot: true
  max_time: 1200
  min_time: 60
  inc: 10
  time_controls:
    - bullet
    - blitz
    - rapid
    - classical
  variants:
    - standard
  modes:
    - casual
    - rated
